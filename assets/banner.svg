<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A22" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#13131A" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5F5F7"/>
      <stop offset="100%" stop-color="#E4E4F5"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="dotGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#FFFFFF" fill-opacity="0.045"/>
    </pattern>
  </defs>

  <!-- base -->
  <rect width="1200" height="380" fill="#0A0A0F"/>
  <rect width="1200" height="380" fill="url(#dotGrid)"/>

  <!-- ambient glows -->
  <circle cx="600" cy="130" r="320" fill="url(#glow1)" filter="url(#softBlur)"/>
  <circle cx="960" cy="280" r="280" fill="url(#glow2)" filter="url(#softBlur)"/>

  <!-- glass panel -->
  <rect x="60" y="48" width="1080" height="284" rx="24" fill="url(#panelGrad)" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>

  <!-- accent tick -->
  <rect x="100" y="110" width="46" height="4" rx="2" fill="url(#accentLine)"/>

  <!-- eyebrow -->
  <text x="100" y="98" font-family="Helvetica, Arial, sans-serif" font-size="15" letter-spacing="3" fill="#9CA3AF">CS ENGINEERING STUDENT · BUILDER</text>

  <!-- name -->
  <text x="98" y="185" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="url(#nameGrad)">Mahak Seth</text>

  <!-- tagline -->
  <text x="100" y="228" font-family="Helvetica, Arial, sans-serif" font-size="21" fill="#C7C9D9">Building AI-powered products while learning to engineer like the best.</text>

  <!-- focus row -->
  <text x="100" y="272" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#8B8FA3">Full-Stack Development</text>
  <circle cx="278" cy="267" r="2.5" fill="#5B5F73"/>
  <text x="292" y="272" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#8B8FA3">DevOps &amp; Cloud</text>
  <circle cx="437" cy="267" r="2.5" fill="#5B5F73"/>
  <text x="451" y="272" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#8B8FA3">AI-Powered Applications</text>

  <!-- bottom accent line -->
  <rect x="100" y="300" width="1000" height="1" fill="#FFFFFF" fill-opacity="0.08"/>
  <text x="100" y="325" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6B6E82">Currently building DeadlineZero — an AI productivity system</text>
</svg>
